# OnePlus 8 Pro Specific Charging Configuration
# This file contains charging parameters optimized for OnePlus 8 Pro
# to resolve power-off charging issues and prevent automatic restarts

# Power-off charging configuration
POWEROFF_CHARGING_ENABLED=1
CHARGE_SCREEN_TIMEOUT=30000
CHARGER_VOLTAGE_LIMIT=5000
CHARGER_CURRENT_LIMIT=3000

# Fast charging settings for OnePlus 8 Pro
FAST_CHARGE_ENABLED=1
WARP_CHARGE_ENABLED=1
MAX_CHARGING_VOLTAGE=5000
MAX_CHARGING_CURRENT=6500

# Thermal management during charging  
THERMAL_LIMIT_ENABLED=1
CHARGING_THERMAL_THRESHOLD=40
CHARGING_COOL_DOWN_TEMP=35

# Power-off charging stability
CHARGER_REBOOT_PREVENTION=1
LOW_POWER_MODE_THRESHOLD=5
CHARGING_LED_ENABLED=1

# OnePlus 8 Pro specific charging chip configuration
CHARGING_IC_TYPE=BQ25890H
FUEL_GAUGE_TYPE=BQ27541
USB_PD_SUPPORT=1
QC_SUPPORT=1